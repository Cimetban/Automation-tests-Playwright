<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | ShopEase</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <h1>ShopEase</h1>
      <p>Sign in to continue shopping</p>
    </div>
    <div class="header-actions">
      <a href="index.html" class="button button-secondary">Home</a>
    </div>
  </header>

  <main class="page-shell">
    <section class="auth-panel">
      <h2>Login to your account</h2>
      <p>Use the demo credentials to access the shopping experience.</p>

      <form id="login-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="user@example.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Password" required />
        </div>

        <button type="submit" class="button button-primary">Login</button>
        <p class="form-message" id="login-message">Demo credentials: user@example.com / password123</p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>Built with HTML, CSS, and JavaScript.</p>
  </footer>

  <script type="module" src="login.js"></script>
</body>
</html>
