<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment | ShopEase</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <h1>ShopEase</h1>
      <p>Complete your order</p>
    </div>
    <div class="header-actions">
      <a href="index.html" class="button button-secondary">Home</a>
      <a href="login.html" class="button button-secondary">Login</a>
    </div>
  </header>

  <main class="page-shell">
    <section class="payment-panel">
      <h2>Payment Details</h2>
      <div class="payment-summary" id="payment-summary"></div>

      <form id="payment-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="fullName">Full name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Your full name" required />
        </div>

        <div class="form-group">
          <label for="cardNumber">Card number</label>
          <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required />
        </div>

        <div class="form-group">
          <label for="expiryDate">Expiry date</label>
          <input type="text" id="expiryDate" name="expiryDate" placeholder="MM / YY" maxlength="7" required />
        </div>

        <div class="form-group">
          <label for="cvv">CVV</label>
          <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="4" required />
        </div>

        <div class="form-group">
          <label for="billingAddress">Billing address</label>
          <textarea id="billingAddress" name="billingAddress" placeholder="Street address, city, country" required></textarea>
        </div>

        <button type="submit" class="button button-primary" id="submit-payment">Submit payment</button>
        <p class="form-message" id="payment-message"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>Built with HTML, CSS, and JavaScript.</p>
  </footer>

  <script src="payment.js"></script>
</body>
</html>
